services:
  - type: web
    name: dpvision-pooja-ai
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DPVISION_AGENT_PROMPT_FILE
        value: agent-prompt.txt
      - key: TWILIO_VOICE
        value: Polly.Aditi
      - key: TWILIO_GATHER_LANGUAGE
        value: en-IN
      - key: TWILIO_GATHER_TIMEOUT
        value: 15
      - key: TWILIO_GATHER_SPEECH_TIMEOUT
        value: auto
      - key: TWILIO_ENHANCED_SPEECH
        value: false
      - key: DIALER_MODE
        value: twilio
      - key: MONGODB_DB_NAME
        value: dpvision_pooja_ai
      - key: MONGODB_TLS_ALLOW_INVALID_CERTIFICATES
        value: false
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_CLIENT_ID
        value: 1011539253936-t4u89nkhik9tfqhveeqcvphariatmr7h.apps.googleusercontent.com
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SIP_TRUNK_DOMAIN
        sync: false
      - key: SIP_AUTH_USERNAME
        sync: false
      - key: SIP_AUTH_PASSWORD
        sync: false
